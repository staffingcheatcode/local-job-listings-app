<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local Job Listings USA — Architecture Blueprint</title>
<style>
  :root{
    --bg:#070d1a; --bg2:#0a1326; --panel:#0c1830; --panelln:#1c2c4d;
    --txt:#e7eefb; --mut:#8aa0c2; --dim:#5b6f93;
    --blue:#3b82f6; --amber:#f5b301; --green:#22c55e; --purple:#a855f7;
    --teal:#2dd4bf; --cyan:#22d3ee; --red:#ef4444; --gray:#94a3b8; --indigo:#818cf8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt);
    overflow:hidden;display:flex;flex-direction:column;height:100vh}

  /* ---------- top bar ---------- */
  header{flex:none;padding:12px 16px 10px;border-bottom:1px solid var(--panelln);
    background:linear-gradient(180deg,#0a1428,#070d1a)}
  .titlerow{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .logo{width:38px;height:38px;border-radius:10px;background:#fff;color:#11539E;font-weight:800;font-size:18px;
    display:flex;align-items:center;justify-content:center;flex:none}
  h1{font-size:17px;margin:0;font-weight:700}
  h1 .u{color:var(--amber)}
  .sub{font-size:12px;color:var(--mut);margin-left:auto}
  .tabs{display:flex;gap:7px;overflow-x:auto;margin-top:10px;padding-bottom:2px}
  .tabs::-webkit-scrollbar{height:0}
  .tab{flex:none;background:#11203c;border:1px solid var(--panelln);color:#bcd0f0;border-radius:9px;
    padding:8px 13px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}
  .tab:hover{border-color:var(--blue)}
  .tab.on{background:var(--amber);color:#1b1300;border-color:var(--amber)}
  .filters{display:flex;gap:7px;overflow-x:auto;margin-top:8px}
  .filters::-webkit-scrollbar{height:0}
  .fbtn{flex:none;background:transparent;border:1px solid var(--panelln);color:var(--mut);border-radius:999px;
    padding:6px 11px;font-size:11.5px;font-weight:600;cursor:pointer;white-space:nowrap}
  .fbtn:hover{color:#fff;border-color:var(--cyan)}
  .fbtn.on{background:#10243f;color:#cde8ff;border-color:var(--cyan)}

  /* ---------- layout ---------- */
  .stage{flex:1;display:flex;min-height:0}
  .canvas-wrap{flex:1;position:relative;overflow:auto;background:
      radial-gradient(circle at 1px 1px, rgba(120,160,220,.10) 1px, transparent 0) 0 0/26px 26px,
      radial-gradient(900px 500px at 80% -10%, rgba(34,211,238,.07), transparent 60%),
      var(--bg)}
  .canvas{position:relative}
  svg.lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

  .node{position:absolute;background:linear-gradient(180deg,#10203c,#0c1830);
    border:1px solid #233a63;border-left:4px solid var(--gray);border-radius:11px;
    padding:7px 9px;cursor:pointer;transition:box-shadow .15s,border-color .15s,opacity .2s,transform .12s;
    display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .node:hover{transform:translateY(-1px)}
  .node .nl{font-size:11px;font-weight:600;line-height:1.18;color:#eaf1fc}
  .node .pill{margin-top:4px;align-self:flex-start;font-size:8.5px;font-weight:800;letter-spacing:.03em;
    text-transform:uppercase;border-radius:5px;padding:1.5px 5px}
  .node.sel{box-shadow:0 0 0 2px currentColor, 0 0 22px 2px currentColor;border-color:currentColor}
  .node.hot{border-color:#cfe3ff}
  .node.dim{opacity:.16;filter:saturate(.4)}
  .node.hide{display:none}

  /* status pills */
  .st-built{background:rgba(34,197,94,.16);color:#7ee2a8}
  .st-tested{background:rgba(59,130,246,.18);color:#9dc2ff}
  .st-mocked{background:rgba(245,179,1,.18);color:#ffd27a}
  .st-progress{background:rgba(245,179,1,.18);color:#ffd27a}
  .st-missing{background:rgba(239,68,68,.18);color:#ff9d9d}
  .st-planned{background:rgba(148,163,184,.18);color:#c7d3e3}
  .st-review{background:rgba(239,68,68,.18);color:#ffb39d}

  /* ---------- detail panel ---------- */
  .panel{flex:none;width:330px;background:var(--panel);border-left:1px solid var(--panelln);
    overflow-y:auto;padding:16px}
  .panel h2{font-size:16px;margin:0 0 3px}
  .panel .ptype{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .panel .pill{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;border-radius:6px;
    padding:3px 8px;margin-top:8px}
  .pk{font-size:11px;color:var(--cyan);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 5px}
  .panel p{font-size:13px;color:#cdd9ec;margin:0;line-height:1.5}
  .panel .tech{font-size:12.5px;color:#9fb2cc}
  .chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .chip{background:#10213c;border:1px solid #25406b;color:#bcd2f0;border-radius:7px;padding:4px 8px;font-size:11px;cursor:pointer}
  .chip:hover{border-color:var(--cyan);color:#fff}
  .filecode{background:#0a1730;border:1px solid #1d3056;border-radius:7px;padding:4px 8px;font-size:11px;
    color:#9fd6c9;font-family:ui-monospace,Menlo,monospace;margin-top:5px;word-break:break-all}
  .risk{display:inline-block;font-size:11px;font-weight:800;border-radius:6px;padding:3px 9px;margin-top:4px}
  .risk.low{background:rgba(34,197,94,.16);color:#7ee2a8}
  .risk.med{background:rgba(245,179,1,.18);color:#ffd27a}
  .risk.high{background:rgba(239,68,68,.18);color:#ff9d9d}
  .risk.none{background:#16243f;color:#9fb2cc}
  .empty{color:var(--mut);font-size:13px;line-height:1.5;margin-top:30px;text-align:center;padding:0 8px}
  .empty .big{font-size:34px;display:block;margin-bottom:10px}

  /* legend */
  .legend{position:absolute;left:12px;bottom:12px;background:rgba(8,16,32,.86);border:1px solid var(--panelln);
    border-radius:11px;padding:10px 12px;font-size:10.5px;color:var(--mut);backdrop-filter:blur(4px);z-index:5;max-width:260px}
  .legend b{color:#dce7f7;display:block;margin-bottom:5px;font-size:10.5px;letter-spacing:.04em}
  .legend .lg{display:inline-flex;align-items:center;gap:5px;margin:2px 9px 2px 0}
  .legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
  .legend .ln{width:16px;height:3px;border-radius:2px;display:inline-block}

  .tabinfo{position:absolute;left:12px;top:12px;right:12px;background:rgba(10,20,40,.9);border:1px solid var(--panelln);
    border-radius:11px;padding:11px 14px;z-index:5;backdrop-filter:blur(4px);max-width:640px}
  .tabinfo h3{margin:0 0 4px;font-size:14px;color:#fff}
  .tabinfo p{margin:0;font-size:12px;color:var(--mut);line-height:1.5}
  .tabinfo .steps{margin:6px 0 0;padding-left:18px;font-size:12px;color:#bcd0f0}
  .tabinfo .steps li{margin:2px 0}

  /* overlay (tabs 6 & 7) */
  .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,13,26,.97),rgba(7,13,26,.99));
    z-index:8;overflow-y:auto;padding:22px;display:none}
  .overlay.on{display:block}
  .overlay h2{font-size:19px;margin:0 0 4px}
  .overlay .osub{color:var(--mut);font-size:13px;margin:0 0 16px}
  .ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:11px}
  .ocard{background:var(--panel);border:1px solid var(--panelln);border-radius:12px;padding:13px}
  .ocard h4{margin:0 0 6px;font-size:13.5px;display:flex;align-items:center;gap:7px}
  .ocard p{margin:0;font-size:12px;color:var(--mut);line-height:1.45}
  .ml{display:flex;gap:11px;align-items:flex-start;background:var(--panel);border:1px solid var(--panelln);
    border-radius:12px;padding:14px;margin-bottom:10px}
  .mln{width:32px;height:32px;border-radius:9px;background:var(--amber);color:#1b1300;font-weight:800;
    display:flex;align-items:center;justify-content:center;flex:none}
  .ml h4{margin:0 0 4px;font-size:14px}
  .ml ul{margin:6px 0 0;padding-left:17px;font-size:12px;color:#bcd0f0}
  .ml ul li{margin:1px 0}
  .dnw{background:rgba(239,68,68,.08);border:1px dashed #6b2b2b;border-radius:12px;padding:14px;margin-top:6px}
  .dnw h4{margin:0 0 6px;color:#ff9d9d;font-size:14px}
  .dnw .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .dnw .tag{background:#1c1320;border:1px solid #5a2a2a;color:#ffb3b3;border-radius:999px;padding:5px 11px;font-size:12px}

  /* checklist */
  .check{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--panelln);
    border-radius:9px;padding:10px 12px;margin-bottom:7px;cursor:pointer}
  .cbox{width:21px;height:21px;border-radius:6px;border:2px solid #3a557f;flex:none;
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px}
  .check.on .cbox{background:var(--green);border-color:var(--green)}
  .check.on .ct{color:#7d93ad;text-decoration:line-through}
  .ct{font-size:13px;font-weight:600}
  .crow{display:flex;gap:8px;align-items:center;margin:4px 0 12px}
  .mini{background:#11203c;border:1px solid var(--panelln);color:#bcd0f0;border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer}

  .badge{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;border-radius:6px;padding:3px 8px}
  .b-plan{background:rgba(148,163,184,.18);color:#c7d3e3}
  .b-req{background:rgba(239,68,68,.18);color:#ff9d9d}
  .b-prog{background:rgba(245,179,1,.18);color:#ffd27a}
  .b-done{background:rgba(34,197,94,.16);color:#7ee2a8}
  .note{background:rgba(245,179,1,.08);border:1px solid #6b5212;color:#ffe19a;border-radius:10px;
    padding:11px 13px;font-size:12px;margin-top:14px}

  @media(max-width:980px){
    .stage{flex-direction:column}
    .panel{width:auto;border-left:none;border-top:1px solid var(--panelln);max-height:42vh}
    .canvas-wrap{min-height:52vh}
  }
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <div class="logo">LJ</div>
    <h1>Local Job Listings <span class="u">USA</span> — Architecture Blueprint</h1>
    <span class="sub">A map of the app's brain · click any box · documentation only (no live data)</span>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="filters" id="filters"></div>
</header>

<div class="stage">
  <div class="canvas-wrap" id="cwrap">
    <div class="canvas" id="canvas">
      <svg class="lines" id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="tabinfo" id="tabinfo"></div>
      <div class="legend" id="legend"></div>
      <div class="overlay" id="overlay"></div>
    </div>
  </div>
  <aside class="panel" id="panel">
    <div class="empty" id="emptyState"><span class="big">🧠</span>Click any box to understand what it does and how it connects.</div>
  </aside>
</div>

  doc:'var(--gray)', risk:'var(--red)' };

  admin:'Admin screen', service:'Service file (src)', backend:'Supabase / backend', security:'Security guard',

============================================================ */

  // ---- USERS (col 0) ----

  // ---- BACKEND / SUPABASE (col 6) ----

const COLX=[24,232,440,648,856,1078,1300], COLW=168, ROWH=50, TOP=92, NH=40;
const idIndex={}; N.forEach(n=>idIndex[n[0]]=n);
// filter edges to existing nodes only
const EDGES = E.filter(e=>idIndex[e[0]] && idIndex[e[1]]);

function band(n){ // security/doc/risk live in bands
  return n[2]==='security'?'security':n[2]==='doc'?'doc':n[2]==='risk'?'risk':null;
}
const colRow={}, bandRow={};
const nodes = N.map(a=>{
  const o={id:a[0],label:a[1],group:a[2],col:a[3],status:a[4],simple:a[5],tech:a[6],
    files:(a[7]||'').split(';').map(s=>s.trim()).filter(Boolean),next:a[8],risk:a[9]};
  return o;
});
let maxColY=TOP;
nodes.forEach(o=>{
  const b=band(o);
  if(!b){
    const c=o.col; const r=(colRow[c]=(colRow[c]??0));
    o.x=COLX[c]; o.y=TOP+r*ROWH; o.w=COLW; o.h=NH; colRow[c]=r+1;
    maxColY=Math.max(maxColY,o.y+o.h);
  }
});
const BTOP=maxColY+46;
const bandY={doc:0,security:1,risk:2};
nodes.forEach(o=>{
  const b=band(o);
  if(b){
    const i=(bandRow[b]=(bandRow[b]??0));
    o.x=24+i*186; o.y=BTOP+bandY[b]*66; o.w=176; o.h=44; bandRow[b]=i+1;
  }
});
const CW=Math.max(...nodes.map(o=>o.x+o.w))+40;
const CH=Math.max(...nodes.map(o=>o.y+o.h))+40;

let state={sel:null, view:null /* null=all, else Set of ids */};

// node elements
const nodeEls={};
nodes.forEach(o=>{
  const el=document.createElement('div');
  el.className='node'; el.style.color=GC[o.group];
  el.style.left=o.x+'px'; el.style.top=o.y+'px'; el.style.width=o.w+'px'; el.style.minHeight=o.h+'px';
  el.style.borderLeftColor=GC[o.group];

  el.innerHTML=`<div class="nl">${o.label}</div><span class="pill ${sc}">${sl}</span>`;

  canvas.appendChild(el); nodeEls[o.id]=el;
});

function center(o){ return {x:o.x+o.w/2, y:o.y+o.h/2}; }
function anchors(a,b){
  // pick sides based on horizontal relationship
  if(b.x >= a.x){ return [{x:a.x+a.w, y:a.y+a.h/2},{x:b.x, y:b.y+b.h/2}]; }
  return [{x:a.x, y:a.y+a.h/2},{x:b.x+b.w, y:b.y+b.h/2}];
}
function pathD(p1,p2){
  const dx=Math.max(40, Math.abs(p2.x-p1.x)*0.45);
  const c1x = p1.x + (p2.x>=p1.x? dx : -dx);
  const c2x = p2.x + (p2.x>=p1.x? -dx : dx);
  return `M ${p1.x} ${p1.y} C ${c1x} ${p1.y}, ${c2x} ${p2.y}, ${p2.x} ${p2.y}`;
}

function renderEdges(){
  const selSet = state.sel ? new Set(connectedIds(state.sel).concat(state.sel)) : null;
  let html='';
  EDGES.forEach((e,i)=>{
    const a=idIndex2(e[0]), b=idIndex2(e[1]);
    const [p1,p2]=anchors(a,b);
    const col=ETYPE[e[2]]||'var(--gray)';
    const inView = !state.view || (state.view.has(e[0]) && state.view.has(e[1]));
    const hot = state.sel && (e[0]===state.sel || e[1]===state.sel);
    let op = inView ? 0.32 : 0.05;
    let w = 1.6;
    if(hot){ op=0.95; w=2.6; }
    else if(state.sel){ op = inView?0.12:0.04; }
    html+=`<path d="${pathD(p1,p2)}" fill="none" stroke="${col}" stroke-width="${w}" opacity="${op}"
      ${hot?`style="filter:drop-shadow(0 0 5px ${col})"`:''}/>`;
  });
  svg.innerHTML=html;
}
function idIndex2(id){ return nodes.find(n=>n.id===id); }
function connectedIds(id){ const s=new Set(); EDGES.forEach(e=>{ if(e[0]===id)s.add(e[1]); if(e[1]===id)s.add(e[0]); }); return [...s]; }

function applyNodeClasses(){
  const conn = state.sel ? new Set(connectedIds(state.sel)) : null;
  nodes.forEach(o=>{
    const el=nodeEls[o.id]; el.classList.remove('sel','hot','dim','hide');
    if(state.view && !state.view.has(o.id)){ el.classList.add('hide'); return; }
    if(state.sel){
      if(o.id===state.sel) el.classList.add('sel');
      else if(conn.has(o.id)) el.classList.add('hot');
      else el.classList.add('dim');
    }
  });
}

function selectNode(id){
  state.sel = (state.sel===id? null : id);
  applyNodeClasses(); renderEdges(); renderPanel();
}

function renderPanel(){
  const p=document.getElementById('panel');
  if(!state.sel){
    p.innerHTML=`<div class="empty"><span class="big">🧠</span>Click any box to understand what it does and how it connects.</div>`;
    return;
  }
  const o=idIndex2(state.sel);
  const [sl,sc]=ST[o.status]||['',''];
  const conns=connectedIds(o.id).map(cid=>{
    const c=idIndex2(cid);
    return `<span class="chip" onclick="selectNode('${cid}')">${c.label}</span>`;
  }).join('');
  const files=o.files.length? o.files.map(f=>`<div class="filecode">${f}</div>`).join('') : '<p class="tech">—</p>';
  p.innerHTML=`
    <div class="ptype" style="color:${GC[o.group]}">${GLABEL[o.group]}</div>
    <h2>${o.label}</h2>
    <span class="pill ${sc}">${sl}</span>
    <div class="pk">In plain words</div><p>${o.simple}</p>
    <div class="pk">Technical</div><p class="tech">${o.tech}</p>
    <div class="pk">Files involved</div>${files}
    <div class="pk">Connected to</div><div class="chiprow">${conns||'<span class="tech">—</span>'}</div>
    <div class="pk">Risk level</div><span class="risk ${o.risk}">${o.risk.toUpperCase()}</span>
    <div class="pk">Next action</div><p>${o.next}</p>`;
}

      <div class="note">This dashboard makes no claim that the app is fully legally compliant. A qualified lawyer must review privacy, terms, and hiring rules before launch.</div>`;
  } else {
    ov.innerHTML=`<h2>➡️ What's next</h2>
      <p class="osub">The road from here to the app stores — in order.</p>
      ${MILES.map(m=>`<div class="ml"><div class="mln">${m[0]}</div><div><h4>Milestone ${m[0]} — ${m[1]}</h4><ul>${m[2].map(x=>`<li>${x}</li>`).join('')}</ul></div></div>`).join('')}
      <div class="dnw"><h4>🚫 Do not waste time yet on</h4>
        <p style="margin:0;color:#e2b3b3;font-size:12px">…until the core loop is live in the real UI.</p>
        <div class="tags">${DNW.map(d=>`<span class="tag">${d}</span>`).join('')}</div></div>
      <h2 style="margin-top:22px">✅ Your blueprint checklist</h2>
      <p class="osub">Saved in this browser only.</p>
      <div class="crow"><button class="mini" onclick="resetCheck()">Reset</button><span class="mini" id="ckCount" style="cursor:default">0 / ${CHECK.length}</span></div>
      <div id="ckList"></div>`;
    renderCheck();
  }
}

/* ---------- checklist (localStorage) ---------- */
const CK='ljl_blueprint_check_v1';
function loadCk(){ try{return JSON.parse(localStorage.getItem(CK)||'{}')}catch(e){return{}} }
function saveCk(s){ try{localStorage.setItem(CK,JSON.stringify(s))}catch(e){} }
function renderCheck(){
  const wrap=document.getElementById('ckList'); if(!wrap) return;
  const s=loadCk(); wrap.innerHTML='';
  CHECK.forEach((item,i)=>{
    const on=!!s['c'+i];
    const el=document.createElement('div'); el.className='check'+(on?' on':'');
    el.innerHTML=`<div class="cbox">${on?'✓':''}</div><div class="ct">${item}</div>`;
    el.onclick=()=>{ const st=loadCk(); st['c'+i]=!st['c'+i]; saveCk(st); renderCheck(); };
    wrap.appendChild(el);
  });
  const done=Object.values(s).filter(Boolean).length;
  const c=document.getElementById('ckCount'); if(c) c.textContent=done+' / '+CHECK.length;
}
function resetCheck(){ saveCk({}); renderCheck(); }

/* ---------- legend ---------- */
function buildLegend(){
  const nodeKeys=[['user','Job seeker'],['employer','Employer'],['agency','Agency'],['admin','Admin'],
    ['backend','Supabase/DB'],['service','Service file'],['security','Security guard'],['doc','Docs/tests'],['risk','Risk']];
  const lineKeys=[['seeker','Seeker flow'],['employer','Employer flow'],['verified','Verified path'],
    ['admin','Admin path'],['backend','Backend link'],['risk','Risk/security'],['doc','Docs link']];
  document.getElementById('legend').innerHTML=
    `<b>Nodes</b>${nodeKeys.map(k=>`<span class="lg"><span class="sw" style="background:${GC[k[0]]}"></span>${k[1]}</span>`).join('')}
     <b style="margin-top:7px">Lines</b>${lineKeys.map(k=>`<span class="lg"><span class="ln" style="background:${ETYPE[k[0]]}"></span>${k[1]}</span>`).join('')}`;
}

buildTabs(); buildLegend(); showTabInfo('overview'); renderEdges(); renderPanel();
